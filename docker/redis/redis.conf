# ── CampusShield — Redis Configuration ───────────────────────────────────────

# Red
bind 0.0.0.0
port 6379
protected-mode yes

# Autenticación (la contraseña real viene de la variable REDIS_PASSWORD en .env)
# requirepass se activa via variable de entorno en el compose

# Persistencia: RDB + AOF para no perder sesiones en reinicios
save 900 1
save 300 10
save 60  10000
appendonly yes
appendfilename "campusshield.aof"
appendfsync everysec

# Memoria máxima y política de evicción
# Al llegar al límite, expira primero las claves con TTL más corto
maxmemory 128mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Deshabilitar comandos peligrosos en producción
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CAMPUSSHIELD_CONFIG"
