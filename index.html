<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CampusShield - Interactive Prototype</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#d0cc00",
                        "secondary-fixed-dim": "#b4c5ff",
                        "tertiary-container": "#b4b000",
                        "on-tertiary-container": "#434200",
                        "primary-container": "#001c65",
                        "on-error": "#ffffff",
                        "primary-fixed": "#dce1ff",
                        "surface-container-highest": "#e1e2ec",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#001551",
                        "surface-bright": "#faf9ff",
                        "surface": "#faf9ff",
                        "primary": "#000a34",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d8d9e4",
                        "surface-container-low": "#f2f3fd",
                        "surface-container": "#ecedf8",
                        "on-primary-container": "#7487d3",
                        "secondary": "#3759b6",
                        "on-secondary-fixed": "#00174c",
                        "inverse-primary": "#b7c4ff",
                        "on-secondary-container": "#002f88",
                        "on-surface-variant": "#454651",
                        "on-primary-fixed-variant": "#2e4289",
                        "on-background": "#191b23",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#eff0fa",
                        "secondary-fixed": "#dbe1ff",
                        "tertiary": "#636100",
                        "on-tertiary-fixed-variant": "#4b4900",
                        "surface-tint": "#475aa2",
                        "surface-variant": "#e1e2ec",
                        "surface-container-high": "#e7e7f2",
                        "on-secondary-fixed-variant": "#18409d",
                        "outline-variant": "#c5c5d2",
                        "inverse-surface": "#2e3038",
                        "secondary-container": "#7d9cfe",
                        "background": "#faf9ff",
                        "on-surface": "#191b23",
                        "primary-fixed-dim": "#b7c4ff",
                        "tertiary-fixed": "#eee900",
                        "on-tertiary-fixed": "#1d1d00",
                        "outline": "#757682",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(250, 249, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .pulse-error {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(186, 26, 26, 0); }
            100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
        }
        body {
            min-height: max(884px, 100dvh);
            overflow-x: hidden;
        }
        /* ── View entrance animations ─────────────────────────── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .view-enter > * {
            opacity: 0;
            animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .view-enter > *:nth-child(1) { animation-delay:   0ms; }
        .view-enter > *:nth-child(2) { animation-delay:  70ms; }
        .view-enter > *:nth-child(3) { animation-delay: 140ms; }
        .view-enter > *:nth-child(4) { animation-delay: 210ms; }
        .view-enter > *:nth-child(5) { animation-delay: 280ms; }
        .view-enter > *:nth-child(6) { animation-delay: 350ms; }
        /* ── True circles (overrides rounded-full: 0.75rem theme) */
        .circle { border-radius: 9999px !important; }

        /* ── Leaflet overrides ─────────────────────────────────── */
        .leaflet-container { font-family: 'Inter', sans-serif; }
        .leaflet-popup-content-wrapper {
            border-radius: 1rem !important;
            box-shadow: 0 8px 32px rgba(0,10,52,0.14) !important;
            border: none !important;
            padding: 0 !important;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip-container { display: none !important; }
        .leaflet-control-attribution { display: none !important; }

        /* ── Custom modal overlay ──────────────────────────────── */
        #modal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,10,52,0.55);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            opacity: 0; transition: opacity 0.2s ease;
            pointer-events: none;
        }
        #modal-overlay.open { opacity: 1; pointer-events: auto; }
        #modal-card {
            background: #faf9ff;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%; max-width: 24rem;
            transform: scale(0.92); transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 24px 64px rgba(0,10,52,0.18);
        }
        #modal-overlay.open #modal-card { transform: scale(1); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
    <div id="app-root">
        <!-- Views will be rendered here -->
    </div>
    <!-- Custom modal (shared, persistent) -->
    <div id="modal-overlay">
        <div id="modal-card">
            <div id="modal-icon-wrap" class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4"></div>
            <h3 id="modal-title" class="font-headline font-extrabold text-xl text-primary mb-2"></h3>
            <p id="modal-body" class="text-sm text-on-surface-variant leading-relaxed mb-6"></p>
            <input id="modal-input" type="text"
                class="hidden w-full mb-5 px-4 py-3 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-secondary text-on-surface transition-all text-sm"/>
            <div id="modal-actions" class="flex gap-3"></div>
        </div>
    </div>
    <script type="module" src="src/app.js"></script>
</body>
</html>
